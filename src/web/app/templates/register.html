{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-header bg-success text-white text-center">
                <h4>Provision Steward Account</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted small mb-3">New to the estate? Register below to receive cluster access.</p>
                <form id="registerForm">
                    <div class="mb-3">
                        <label>Choose a Username</label>
                        <input type="text" id="regUsername" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Choose a Password</label>
                        <input type="password" id="regPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <div class="mt-3 text-center">
                    <small>Already have an account? <a href="/login">Login here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('regUsername').value;
    const p = document.getElementById('regPassword').value;

    const res = await fetch('/api/v1/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
    });
    
    if (res.ok) {
        window.location.href = '/login?registered=success';
    } else {
        const data = await res.json();
        showAlert(data.error || 'Registration failed', 'danger');
    }
});
</script>
{% endblock %}
