{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-4">
            <div class="card-header bg-danger text-white">
                <h4>Report</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Flag a steward profile for review. A Pleiades Watchdog will inspect the link shortly.</p>
                <form id="ticketForm">
                    <div class="mb-3">
                        <label>Profile URL</label>
                        <input type="url" id="targetUrl" class="form-control" placeholder="http://localhost:8080/profile/username" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Submit Report</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('ticketForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const url = document.getElementById('targetUrl').value;

    const res = await fetch('/api/v1/support/ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
    });
    
    const data = await res.json();
    if (res.ok) {
        showAlert(data.message, 'success');
    } else {
        showAlert(data.error, 'danger');
    }
});
</script>
{% endblock %}
