<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ username }}'s Profile &mdash; Pleiades</title>
    <style>
        body {
            background-color: #eae3d3;
            color: #2b2618;
            font-family: Georgia, "Times New Roman", serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .public-banner {
            background-color: #f7f1de;
            border: 1px solid #c9bd9a;
            border-left: 4px solid #a8863f;
            padding: 10px 16px;
            font-family: -apple-system, Arial, sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            color: #6b5d3a;
            margin-bottom: 24px;
        }
        .profile-header {
            border-bottom: 2px solid #c9bd9a;
            padding-bottom: 12px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin-right: 6px;
        }
        #statusLine {
            font-family: -apple-system, Arial, sans-serif;
            font-size: 0.8rem;
            color: #6b5d3a;
        }
        #bio {
            margin-top: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="public-banner">&#9733; PUBLIC STEWARD PROFILE &middot; anyone with this link can view this page</div>

    <div class="profile-header">
        <h1 style="border:none; margin:0; padding:0;">{{ username }}</h1>
        <div id="statusLine"><span class="status-dot"></span>Checking availability&hellip;</div>
    </div>

    <div id="bio"></div>

    <script>
        function sanitizeBio(dirtyHtml) {
            let parser = new DOMParser();
            let doc = parser.parseFromString(dirtyHtml, 'text/html');

            let allowedTags = ['B', 'I', 'U', 'P', 'DIV', 'SPAN', 'H1', 'H2', 'FORM'];
            let allowedAttributes = ['id', 'class', 'action', 'method'];

            let elements = doc.body.getElementsByTagName("*");

            for (let i = elements.length - 1; i >= 0; i--) {
                let el = elements[i];

                if (!allowedTags.includes(el.tagName)) {
                    el.parentNode.removeChild(el);
                    continue;
                }

                for (let j = el.attributes.length - 1; j >= 0; j--) {
                    let attr = el.attributes[j];
                    if (!allowedAttributes.includes(attr.name.toLowerCase())) {
                        el.removeAttribute(attr.name);
                    }
                }

                if (el.tagName === 'FORM' && el.getAttribute('action')) {
                    if (el.getAttribute('action').toLowerCase().includes('javascript:')) {
                        el.removeAttribute('action');
                    }
                }
            }
            return doc.body.innerHTML;
        }

        let rawBio = {{ bio | tojson }};
        document.getElementById('bio').innerHTML = sanitizeBio(rawBio);

        setTimeout(() => {
            let config = window.STEWARD_STATUS_CONFIG || { action: "/api/v1/support/telemetry/event", method: "POST" };
            let statusLine = document.getElementById('statusLine');

            fetch(config.action, { method: config.method })
                .then(() => { statusLine.innerHTML = '<span class="status-dot" style="background:#5a9c5a;"></span>Status synced'; })
                .catch(() => { statusLine.innerHTML = '<span class="status-dot"></span>Status unavailable'; });
        }, 1000);
    </script>
</body>
</html>
