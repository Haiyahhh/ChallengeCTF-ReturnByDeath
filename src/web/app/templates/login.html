{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-header bg-primary text-white text-center">
                <h4>&#9670; Cluster Access</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted small mb-3">Authorized stewards only. All sessions are logged by the Watchdog network.</p>
                <form id="loginForm">
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('registered') === 'success') {
    showAlert('Registration successful! Please log in with your new credentials.', 'success');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;

    const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
    });
    
    const data = await res.json();
    if (res.ok) {
        window.location.href = '/dashboard';
    } else {
        showAlert(data.error || 'Login failed');
    }
});
</script>
{% endblock %}
