{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2 class="mb-4 text-pleiades">Household Staff Directory</h2>
        <p class="text-muted mb-4">Browse profiles of registered stewards across the estate.</p>
        <div id="staffList" class="list-group"></div>
    </div>
</div>

<script>
(async () => {
    const listEl = document.getElementById('staffList');
    try {
        const res = await fetch('/api/v1/users');
        const data = await res.json();
        if (!res.ok) {
            listEl.innerHTML = '<div class="text-muted">Directory unavailable.</div>';
            return;
        }
        if (!data.staff.length) {
            listEl.innerHTML = '<div class="text-muted">No stewards registered yet.</div>';
            return;
        }
        listEl.innerHTML = '';
        data.staff.forEach(s => {
            const link = document.createElement('a');
            link.href = `/profile/${encodeURIComponent(s.username)}`;
            link.className = 'list-group-item list-group-item-action d-flex align-items-center gap-3';

            const img = document.createElement('img');
            img.src = s.avatar_url;
            img.alt = '';
            img.width = 36;
            img.height = 36;
            img.style.borderRadius = '50%';
            img.style.objectFit = 'cover';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'flex-grow-1';
            nameSpan.textContent = s.username;

            const roleSpan = document.createElement('span');
            roleSpan.className = 'badge bg-secondary';
            roleSpan.textContent = s.role;

            link.append(img, nameSpan, roleSpan);
            listEl.appendChild(link);
        });
    } catch (e) {
        listEl.innerHTML = '<div class="text-muted">Directory unavailable.</div>';
    }
})();
</script>
{% endblock %}
